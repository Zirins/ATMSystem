name: .NET CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ATMSystem.slnx

      - name: Build
        run: dotnet build ATMSystem.slnx --no-restore

      - name: Test
        run: dotnet test ATMSystem.slnx --no-build --collect:"XPlat Code Coverage"